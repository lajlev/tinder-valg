<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1228"/>
      <stop offset="100%" stop-color="#150d1e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Decorative swipe cards in background -->
  <g opacity="0.08">
    <rect x="150" y="80" width="300" height="420" rx="24" fill="#ef4444" transform="rotate(-12, 300, 290)"/>
    <rect x="750" y="80" width="300" height="420" rx="24" fill="#10b981" transform="rotate(12, 900, 290)"/>
  </g>
  <!-- Center card -->
  <rect x="390" y="60" width="420" height="440" rx="28" fill="url(#cardGrad)" stroke="#ef4444" stroke-opacity="0.3" stroke-width="2"/>
  <text x="600" y="180" text-anchor="middle" font-size="80" fill="#fff">🔥</text>
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="56" fill="#ffffff">ValgTinder</text>
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="24" fill="#94a3b8">Valg 2026</text>
  <!-- Swipe indicators on card -->
  <g transform="translate(440, 360)">
    <rect width="100" height="44" rx="10" fill="#ef4444" fill-opacity="0.2"/>
    <text x="50" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#f87171">← UENIG</text>
  </g>
  <g transform="translate(660, 360)">
    <rect width="100" height="44" rx="10" fill="#10b981" fill-opacity="0.2"/>
    <text x="50" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#34d399">ENIG →</text>
  </g>
  <!-- Bottom text -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#e2e8f0">Swipe dig til dit parti</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#475569">lajlev.github.io/tinder-valg</text>
</svg>
