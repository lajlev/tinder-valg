<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0b0e17" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0b0e17"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#10b981" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="560" x2="1200" y2="560"/>
  </g>
  <!-- Budget bar decoration -->
  <rect x="200" y="140" width="800" height="12" rx="6" fill="#1e2a42"/>
  <rect x="200" y="140" width="520" height="12" rx="6" fill="#10b981" fill-opacity="0.6"/>
  <circle cx="720" y="146" r="8" fill="#10b981"/>
  <!-- Emoji -->
  <text x="600" y="260" text-anchor="middle" font-size="80" fill="#fff">🏛️</text>
  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="64" fill="#ffffff">Budget<tspan fill="#10b981">Minister</tspan></text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="28" fill="#94a3b8">Valg 2026</text>
  <!-- Budget stats -->
  <g transform="translate(310, 430)">
    <rect width="180" height="64" rx="14" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="30" cy="32" r="6" fill="#10b981"/>
    <text x="50" y="28" font-family="monospace" font-weight="500" font-size="14" fill="#64748b">Sparer</text>
    <text x="50" y="48" font-family="monospace" font-weight="700" font-size="18" fill="#34d399">+12,4 mia.</text>
  </g>
  <g transform="translate(520, 430)">
    <rect width="180" height="64" rx="14" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
    <circle cx="30" cy="32" r="6" fill="#ef4444"/>
    <text x="50" y="28" font-family="monospace" font-weight="500" font-size="14" fill="#64748b">Bruger</text>
    <text x="50" y="48" font-family="monospace" font-weight="700" font-size="18" fill="#f87171">−8,2 mia.</text>
  </g>
  <g transform="translate(730, 430)">
