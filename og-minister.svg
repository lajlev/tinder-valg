  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="24" fill="#e2e8f0">Sammensæt dit eget budget for Danmark</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#475569">lajlev.github.io/tinder-valg</text>
